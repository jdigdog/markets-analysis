name: Fetch Market Data

on:
  schedule:
    - cron: "0 6 * * 1-5"  # Weekdays at 6 AM UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch prices
        run: python scripts/fetch_prices.py

      - name: Fetch dividends
        run: python scripts/fetch_dividends.py

      - name: Fetch fundamentals
        run: python scripts/fetch_fundamentals.py

      - name: Generate JSON feeds
        run: python scripts/generate_feeds.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Daily data update $(date -u +%Y-%m-%d)"
          git push
