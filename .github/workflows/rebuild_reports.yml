name: Rebuild Reports


on:
  workflow_dispatch:  # Manual trigger only
  workflow_call:      # Can be called by other workflows

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate JSON data feeds
        run: python scripts/generate_feeds.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reports/
          git diff --staged --quiet || git commit -m "🔄 Rebuild reports $(date -u +%Y-%m-%d)"
          git push
# Sanity check: catch wrong dataDir before it ships
grep -q '"../data/reports/data"' site/app.js || (echo "ERROR: wrong dataDir in app.js" && exit 1)
