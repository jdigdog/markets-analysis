name: Fetch Holdings

on:
  schedule:
    - cron: "0 10 * * 0"  # Sundays at 10 AM UTC
  workflow_dispatch:
    inputs:
      universe:
        description: "Universe ID to refresh (leave empty for all)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  fetch-holdings:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh holdings
        run: |
          ARGS=""
          if [ -n "${{ inputs.universe }}" ]; then
            ARGS="--universe ${{ inputs.universe }}"
          fi
          python scripts/fetch_holdings.py $ARGS

      - name: Generate JSON feeds
        run: python scripts/generate_feeds.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "📋 Holdings refresh $(date -u +%Y-%m-%d)"
          git push
