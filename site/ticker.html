<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticker Detail — Markets Analysis</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <div id="nav"></div>

  <main class="container">
    <div class="section-header" style="margin-top: var(--space-xl);">
      <h1 class="section-title" id="ticker-title">Loading...</h1>
      <p class="section-subtitle" id="ticker-desc"></p>
    </div>

    <!-- Price Chart -->
    <div class="chart-container">
      <div class="chart-header">
        <span class="chart-title">Price History</span>
        <div class="chart-controls">
          <button class="chart-btn" data-window="3M">3M</button>
          <button class="chart-btn" data-window="6M">6M</button>
          <button class="chart-btn active" data-window="2Y">2Y</button>
        </div>
      </div>
      <div id="price-chart" style="height: 420px;"></div>
    </div>

    <!-- Info Grid -->
    <div class="grid grid-2" style="margin-top: var(--space-lg);">
      <div class="card">
        <div class="card-title" style="margin-bottom: var(--space-md);">Fundamentals</div>
        <div id="fundamentals-panel"><div class="loading">Loading...</div></div>
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom: var(--space-md);">Sentiment</div>
        <div id="sentiment-panel"><div class="loading">Loading...</div></div>
      </div>
    </div>

    <!-- Universe Membership -->
    <div class="section-header">
      <h2 class="section-title">Member Of</h2>
      <p class="section-subtitle" id="membership-desc">Universes containing this ticker</p>
    </div>
    <div id="membership" class="grid grid-3"></div>
  </main>

  <script src="app.js"></script>
  <script>
    const MIP = window.MIP;

    const ticker = MIP.getUrlParam("t") || "AAPL";
    MIP.UI.renderNav(null);

    document.getElementById("ticker-title").textContent = ticker;
    document.title = `${ticker} — Markets Analysis`;

    let allPrices2Y = null;

    function daysForWindow(w) {
      if (w === "3M") return 90;
      if (w === "6M") return 180;
      return 730;
    }

    function renderPriceChart(windowLabel) {
      if (!allPrices2Y || !allPrices2Y.tickers[ticker]) return;

      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - daysForWindow(windowLabel));
      const cutoffStr = cutoff.toISOString().slice(0, 10);

      const filteredDates = allPrices2Y.dates.filter(d => d >= cutoffStr);
      const startIdx = allPrices2Y.dates.indexOf(filteredDates[0]);
      const filteredPrices = allPrices2Y.tickers[ticker].slice(startIdx);

      const chart = MIP.Charts.createPriceChart("price-chart", null, { height: 420 });
      if (!chart) return;

      const series = chart.addAreaSeries({
        topColor: "rgba(88, 166, 255, 0.3)",
        bottomColor: "rgba(88, 166, 255, 0.02)",
        lineColor: "#58a6ff",
        lineWidth: 2,
      });

      const data = filteredDates.map((d, i) => ({
        time: d,
        value: filteredPrices[i],
      })).filter(d => d.value != null);

      series.setData(data);
      chart.timeScale().fitContent();
    }

    document.querySelectorAll(".chart-controls .chart-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".chart-controls .chart-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderPriceChart(btn.dataset.window);
      });
    });

    (async () => {
      // ── Price chart ──
      allPrices2Y = await MIP.DataStore.getPrices("2y");
      renderPriceChart("2Y");

      // ── Fundamentals ──
      const fundData = await MIP.DataStore.getFundamentals();
      const fund = fundData?.find(f => f.Ticker === ticker);
      const fundPanel = document.getElementById("fundamentals-panel");

      if (fund) {
        document.getElementById("ticker-desc").textContent =
          `${fund.Name || ""} · ${fund.Sector || ""} · ${fund.Industry || ""}`;
        const rows = [
          ["Market Cap",      MIP.formatNumber(fund.MarketCap)],
          ["P/E (TTM)",       fund.PE ? MIP.formatNumber(fund.PE, 1) : "—"],
          ["Forward P/E",     fund.ForwardPE ? MIP.formatNumber(fund.ForwardPE, 1) : "—"],
          ["EPS (TTM)",       fund.EPS ? "$" + MIP.formatNumber(fund.EPS) : "—"],
          ["52W High",        fund.High52W ? "$" + MIP.formatNumber(fund.High52W) : "—"],
          ["52W Low",         fund.Low52W ? "$" + MIP.formatNumber(fund.Low52W) : "—"],
          ["Analyst Target",  fund.AnalystTarget ? "$" + MIP.formatNumber(fund.AnalystTarget) : "—"],
          ["Dividend Yield",  fund.DividendYield ? MIP.formatPercent(fund.DividendYield * 100) : "—"],
          ["Beta",            fund.Beta ? MIP.formatNumber(fund.Beta) : "—"],
        ];
        fundPanel.innerHTML = `<table style="width:100%;font-size:0.875rem">
          ${rows.map(([k, v]) => `<tr><td style="color:var(--text-muted);padding:4px 0">${k}</td><td class="text-right text-mono" style="padding:4px 0">${v}</td></tr>`).join("")}
        </table>`;
      } else {
        fundPanel.innerHTML = '<div class="empty-state">No fundamentals available</div>';
      }

      // ── Sentiment ──
      const sentiment = await MIP.DataStore.getSentiment();
      const sentPanel = document.getElementById("sentiment-panel");
      const sentRecord = sentiment?.latest?.find(s => s.Ticker === ticker);

      if (sentRecord) {
        sentPanel.innerHTML = `
          <div style="text-align:center; margin-bottom: var(--space-md);">
            <div class="card-metric" style="color:${MIP.sentimentColor(sentRecord.Score)}">${sentRecord.Score.toFixed(2)}</div>
            <span class="badge ${MIP.sentimentBadgeClass(sentRecord.Label)}" style="margin-top:var(--space-sm)">${sentRecord.Label}</span>
          </div>
          <p style="font-size:0.875rem;color:var(--text-secondary)">${sentRecord.Summary || ""}</p>
          <p style="font-size:0.75rem;color:var(--text-muted);margin-top:var(--space-sm)">Based on ${sentRecord.ArticleCount || 0} articles · ${sentRecord.Date}</p>
        `;
      } else {
        sentPanel.innerHTML = '<div class="empty-state">No sentiment data</div>';
      }

      // ── Universe membership ──
      const universes = await MIP.DataStore.getUniverses();
      const membershipEl = document.getElementById("membership");
      const memberships = [];

      if (universes) {
        for (const u of universes) {
          const holdings = await MIP.DataStore.getHoldings(u.id);
          if (holdings?.some(h => h.Ticker === ticker)) {
            const holding = holdings.find(h => h.Ticker === ticker);
            memberships.push({ ...u, weight: holding?.WeightPct });
          }
        }
      }

      if (memberships.length > 0) {
        membershipEl.innerHTML = memberships.map(u => `
          <a href="universe.html?id=${u.id}" class="card" style="text-decoration:none">
            <div class="card-title">${u.name || u.id}</div>
            <div class="card-subtitle">${u.type.toUpperCase()} · Weight: ${u.weight ? MIP.formatNumber(u.weight) + "%" : "Equal"}</div>
          </a>
        `).join("");
      } else {
        membershipEl.innerHTML = '<div class="empty-state">Not found in any tracked universe</div>';
      }
    })();
  </script>
</body>
</html>
