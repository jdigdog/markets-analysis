<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentiment Dashboard — Markets Analysis</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <div id="nav"></div>

  <main class="container">
    <div class="section-header" style="margin-top: var(--space-xl);">
      <h1 class="section-title">Sentiment Dashboard</h1>
      <p class="section-subtitle">AI-powered sentiment scoring across all tracked universes</p>
    </div>

    <!-- Sentiment Heatmap -->
    <div class="chart-container">
      <div class="chart-header">
        <span class="chart-title">8-Week Sentiment Heatmap</span>
      </div>
      <div id="heatmap" style="height: 500px;"></div>
    </div>

    <!-- Latest Scores Table -->
    <div class="section-header">
      <h2 class="section-title">Latest Scores</h2>
    </div>
    <div id="scores-table"></div>
  </main>

  <script src="app.js"></script>
  <script>
    const { UI, DataStore, formatNumber, sentimentColor, sentimentBadgeClass } = window.MIP;

    UI.renderNav("sentiment");

    (async () => {
      const sentiment = await DataStore.getSentiment();

      // ── Heatmap (ECharts) ──
      if (sentiment && sentiment.history && sentiment.history.length > 0) {
        const history = sentiment.history;

        // Build axes
        const tickers = [...new Set(history.map(r => r.Ticker))].sort();
        const dates = [...new Set(history.map(r => r.Date))].sort();

        // Build data matrix
        const dataPoints = [];
        history.forEach(r => {
          const xi = dates.indexOf(r.Date);
          const yi = tickers.indexOf(r.Ticker);
          if (xi >= 0 && yi >= 0) {
            dataPoints.push([xi, yi, r.Score]);
          }
        });

        const chart = echarts.init(document.getElementById("heatmap"), null, { renderer: "canvas" });
        chart.setOption({
          backgroundColor: "#1c2128",
          tooltip: {
            formatter: (p) => `${tickers[p.data[1]]}<br>${dates[p.data[0]]}<br>Score: ${p.data[2].toFixed(2)}`,
          },
          xAxis: {
            type: "category",
            data: dates.map(d => d.slice(5)),
            axisLabel: { color: "#8b949e", fontSize: 11 },
            splitLine: { show: false },
          },
          yAxis: {
            type: "category",
            data: tickers,
            axisLabel: { color: "#8b949e", fontSize: 11 },
            splitLine: { show: false },
          },
          visualMap: {
            min: -1,
            max: 1,
            calculable: true,
            orient: "horizontal",
            left: "center",
            bottom: 0,
            inRange: {
              color: ["#f85149", "#6e7681", "#3fb950"],
            },
            textStyle: { color: "#8b949e" },
          },
          series: [{
            type: "heatmap",
            data: dataPoints,
            label: { show: false },
            emphasis: {
              itemStyle: { borderColor: "#58a6ff", borderWidth: 2 },
            },
          }],
        });

        window.addEventListener("resize", () => chart.resize());
      } else {
        document.getElementById("heatmap").innerHTML =
          '<div class="empty-state">No sentiment history available yet. Run the sentiment workflow to populate this chart.</div>';
      }

      // ── Latest scores table ──
      if (sentiment && sentiment.latest && sentiment.latest.length > 0) {
        const sorted = sentiment.latest.sort((a, b) => b.Score - a.Score);
        const rows = sorted.map(r => `
          <tr>
            <td><a href="ticker.html?t=${r.Ticker}">${r.Ticker}</a></td>
            <td class="text-right text-mono" style="color:${sentimentColor(r.Score)}">${r.Score.toFixed(2)}</td>
            <td><span class="badge ${sentimentBadgeClass(r.Label)}">${r.Label}</span></td>
            <td style="font-size:0.8125rem;color:var(--text-secondary)">${r.Summary || "—"}</td>
            <td class="text-center text-mono">${r.ArticleCount || 0}</td>
          </tr>
        `).join("");

        document.getElementById("scores-table").innerHTML = `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Ticker</th>
                  <th class="text-right">Score</th>
                  <th>Label</th>
                  <th>Summary</th>
                  <th class="text-center">Articles</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        `;
      } else {
        document.getElementById("scores-table").innerHTML =
          '<div class="empty-state">No sentiment scores available</div>';
      }
    })();
  </script>
</body>
</html>
