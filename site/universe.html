<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universe Detail — Markets Analysis</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <div id="nav"></div>

  <main class="container">
    <div class="section-header" style="margin-top: var(--space-xl);">
      <h1 class="section-title" id="universe-title">Loading...</h1>
      <p class="section-subtitle" id="universe-desc"></p>
    </div>

    <!-- Performance Chart -->
    <div class="chart-container">
      <div class="chart-header">
        <span class="chart-title">Relative Performance (Top 10 Holdings vs Benchmark)</span>
        <div class="chart-controls">
          <button class="chart-btn" data-window="1M">1M</button>
          <button class="chart-btn" data-window="3M">3M</button>
          <button class="chart-btn active" data-window="1Y">1Y</button>
        </div>
      </div>
      <div id="perf-chart" style="height: 420px;"></div>
    </div>

    <!-- Holdings Table -->
    <div class="section-header">
      <h2 class="section-title">Holdings</h2>
    </div>
    <div id="holdings-table"></div>
  </main>

  <script src="app.js"></script>
  <script>
    const MIP = window.MIP;

    const universeId = MIP.getUrlParam("id") || "QQQ";
    MIP.UI.renderNav(null);

    const COLOURS = [
      "#58a6ff", "#3fb950", "#f85149", "#d29922", "#bc8cff",
      "#79c0ff", "#56d364", "#ff7b72", "#e3b341", "#d2a8ff",
    ];

    let allPrices = null;
    let allHoldings = null;
    let metaData = null;
    let currentWindow = "1Y";

    function daysForWindow(w) {
      if (w === "1M") return 30;
      if (w === "3M") return 90;
      return 365;
    }

    function renderPerfChart(windowLabel) {
      if (!allPrices || !allHoldings || !allHoldings.length) return;

      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - daysForWindow(windowLabel));
      const cutoffStr = cutoff.toISOString().slice(0, 10);

      const top10 = allHoldings
        .sort((a, b) => (b.WeightPct || 0) - (a.WeightPct || 0))
        .slice(0, 10)
        .map(h => h.Ticker);

      const chart = MIP.Charts.createPriceChart("perf-chart", null, { height: 420 });
      if (!chart) return;

      top10.forEach((ticker, i) => {
        const tickerPrices = allPrices.tickers[ticker];
        if (!tickerPrices) return;
        const filteredDates = allPrices.dates.filter(d => d >= cutoffStr);
        const startIdx = allPrices.dates.indexOf(filteredDates[0]);
        const filteredPrices = tickerPrices.slice(startIdx);
        const data = MIP.Charts.normalisePerformance(filteredDates, filteredPrices);
        MIP.Charts.addLineSeries(chart, data, {
          color: COLOURS[i % COLOURS.length],
          percent: true,
          lineWidth: ticker === universeId ? 3 : 1.5,
        });
      });

      const benchTicker = metaData?.benchmark || universeId;
      if (allPrices.tickers[benchTicker]) {
        const filteredDates = allPrices.dates.filter(d => d >= cutoffStr);
        const startIdx = allPrices.dates.indexOf(filteredDates[0]);
        const filteredPrices = allPrices.tickers[benchTicker].slice(startIdx);
        const benchData = MIP.Charts.normalisePerformance(filteredDates, filteredPrices);
        MIP.Charts.addLineSeries(chart, benchData, {
          color: "#6e7681",
          percent: true,
          lineWidth: 2,
          seriesOptions: { lineStyle: 2 },
        });
      }

      chart.timeScale().fitContent();
    }

    document.querySelectorAll(".chart-controls .chart-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".chart-controls .chart-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentWindow = btn.dataset.window;
        renderPerfChart(currentWindow);
      });
    });

    (async () => {
      const universes = await MIP.DataStore.getUniverses();
      metaData = universes?.find(u => u.id === universeId);
      document.getElementById("universe-title").textContent = metaData?.name || universeId;
      document.getElementById("universe-desc").textContent =
        `${metaData?.type?.toUpperCase() || "UNIVERSE"} · ${metaData?.ticker_count || 0} holdings · Benchmark: ${metaData?.benchmark || "SPY"}`;
      document.title = `${metaData?.name || universeId} — Markets Analysis`;

      allHoldings = await MIP.DataStore.getHoldings(universeId);
      MIP.UI.renderHoldingsTable("holdings-table", allHoldings);

      allPrices = await MIP.DataStore.getPrices();
      renderPerfChart(currentWindow);
    })();
  </script>
</body>
</html>
