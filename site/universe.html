<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universe Detail — Markets Analysis</title>
  <link rel="stylesheet" href="site/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <div id="nav"></div>

  <main class="container">
    <div class="section-header" style="margin-top: var(--space-xl);">
      <h1 class="section-title" id="universe-title">Loading...</h1>
      <p class="section-subtitle" id="universe-desc"></p>
    </div>

    <!-- Performance Chart -->
    <div class="chart-container">
      <div class="chart-header">
        <span class="chart-title">Relative Performance (Top 10 Holdings vs Benchmark)</span>
        <div class="chart-controls">
          <button class="chart-btn" data-window="1M">1M</button>
          <button class="chart-btn" data-window="3M">3M</button>
          <button class="chart-btn active" data-window="1Y">1Y</button>
        </div>
      </div>
      <div id="perf-chart" style="height: 420px;"></div>
    </div>

    <!-- Holdings Table -->
    <div class="section-header">
      <h2 class="section-title">Holdings</h2>
    </div>
    <div id="holdings-table"></div>
  </main>

  <script src="site/app.js"></script>
  <script>
    const { UI, DataStore, Charts, getUrlParam, formatPercent, sentimentBadgeClass } = window.MIP;

    const universeId = getUrlParam("id") || "QQQ";
    UI.renderNav(null);

    // Colour palette for chart lines
    const COLOURS = [
      "#58a6ff", "#3fb950", "#f85149", "#d29922", "#bc8cff",
      "#79c0ff", "#56d364", "#ff7b72", "#e3b341", "#d2a8ff",
    ];

    (async () => {
      // Load universe metadata
      const universes = await DataStore.getUniverses();
      const meta = universes?.find(u => u.id === universeId);
      document.getElementById("universe-title").textContent = meta?.name || universeId;
      document.getElementById("universe-desc").textContent =
        `${meta?.type?.toUpperCase() || "UNIVERSE"} · ${meta?.ticker_count || 0} holdings · Benchmark: ${meta?.benchmark || "SPY"}`;
      document.title = `${meta?.name || universeId} — Markets Analysis`;

      // Load holdings
      const holdings = await DataStore.getHoldings(universeId);
      UI.renderHoldingsTable("holdings-table", holdings);

      // Load prices and build performance chart
      const prices = await DataStore.getPrices();
      if (prices && holdings && holdings.length > 0) {
        const top10 = holdings
          .sort((a, b) => (b.WeightPct || 0) - (a.WeightPct || 0))
          .slice(0, 10)
          .map(h => h.Ticker);

        const chart = Charts.createPriceChart("perf-chart", null, { height: 420 });
        if (chart) {
          top10.forEach((ticker, i) => {
            const tickerPrices = prices.tickers[ticker];
            if (!tickerPrices) return;
            const data = Charts.normalisePerformance(prices.dates, tickerPrices);
            Charts.addLineSeries(chart, data, {
              color: COLOURS[i % COLOURS.length],
              percent: true,
              lineWidth: ticker === universeId ? 3 : 1.5,
            });
          });

          // Add benchmark line
          const benchTicker = meta?.benchmark || universeId;
          if (prices.tickers[benchTicker]) {
            const benchData = Charts.normalisePerformance(prices.dates, prices.tickers[benchTicker]);
            Charts.addLineSeries(chart, benchData, {
              color: "#6e7681",
              percent: true,
              lineWidth: 2,
              seriesOptions: { lineStyle: 2 },
            });
          }

          chart.timeScale().fitContent();
        }
      }
    })();
  </script>
</body>
</html>
